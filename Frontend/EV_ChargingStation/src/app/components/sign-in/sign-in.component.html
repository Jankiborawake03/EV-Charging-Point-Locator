<div class="signin-page">
  <div class="signin-container">
    <div class="signin-card">
      <h2>Welcome Back to <span class="brand-name">VoltWay</span></h2>
      <h1>Sign In</h1>

      
      <div *ngIf="successMessage" class="alert success">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert error">
        {{ errorMessage }}
      </div>

    
      <div class="role-toggle">
        <button [class.active]="isEVOwner" (click)="setUserType('evOwner')">
          <i class="fas fa-car"></i> EV Owner
        </button>
        <button [class.active]="!isEVOwner" (click)="setUserType('host')">
          <i class="fas fa-charging-station"></i> Station Host
        </button>
      </div>


      <form *ngIf="isEVOwner" [formGroup]="signInForm" (ngSubmit)="onSubmit()">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email*" formControlName="email" required />
        </div>
        <div class="input-group">
        
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Password*" formControlName="password" required />
          <i class="eye-icon fas fa-eye" (click)="togglePasswordVisibility()"></i>
        </div>
        <a (click)="goToForgotPassword()" class="forgot-password">Forgot Password?</a>
        <button type="submit" [disabled]="signInForm.invalid">Sign In</button>
      </form>

      
      <form *ngIf="!isEVOwner" [formGroup]="hostSignInForm" (ngSubmit)="onHostSubmit()">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email*" formControlName="email" required />
        </div>
        <div class="input-group">
         
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Password*" formControlName="password" required />
          <i class="eye-icon fas fa-eye" (click)="togglePasswordVisibility()"></i>
        </div>
        <a (click)="goToForgotPassword()" class="forgot-password">Forgot Password?</a>
        <button type="submit" [disabled]="hostSignInForm.invalid">Sign In</button>
      </form>

      <p class="signup-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
    </div>
  </div>
</div>
