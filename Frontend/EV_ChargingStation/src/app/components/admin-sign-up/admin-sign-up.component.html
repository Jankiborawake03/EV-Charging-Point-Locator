<div class="signup-page">
    <div class="signup-container">
      <div class="signup-card">
        <h2>Welcome to <span class="brand-name">VoltWay</span></h2>
        <h1>Create Admin Account</h1>
        <div *ngIf="successMessage" class="alert success">
          {{ successMessage }}
        </div>
        <div *ngIf="errorMessage" class="alert error">
          {{ errorMessage }}
        </div>
        <form [formGroup]="signupForm" (ngSubmit)="onSignup()">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="First Name*" formControlName="firstName" required />
          </div>
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Last Name*" formControlName="lastName" required />
          </div>
          <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="text" placeholder="Contact Number*" formControlName="contactNumber" required />
          </div>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email*" formControlName="email" required />
          </div>
          <div class="input-group">
            <input [type]="showPassword ? 'text' : 'password'" placeholder="Password*" formControlName="password" required />
            <i class="eye-icon fas fa-eye" (click)="togglePasswordVisibility()"></i>
          </div>
          <button type="submit" [disabled]="signupForm.invalid">Sign up</button>
        </form>
        <p class="signin-link">Already have an account? <a routerLink="/admin-sign-in">Sign in</a></p>
      </div>
    </div>
  </div>
