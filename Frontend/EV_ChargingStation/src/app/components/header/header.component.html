
<header class="header">
  <div class="logo">
    <img src="/assets/Valtwaylogo.jpg" alt="VoltWay" [routerLink]="['/']">
  </div>

  <nav class="nav-links">
    <a routerLink="/">Home</a>
    <a routerLink="/about-us">About Us</a>
    <a routerLink="/contact-us">Get In Touch</a>

    
    <div class="user-menu" *ngIf="isLoggedIn">
      <a class="user-name-btn" (click)="toggleDropdown()">
        {{ userFirstName }} {{ userLastName }} ▼
      </a>
      <div class="dropdown" *ngIf="isDropdownOpen">
        <a routerLink="/profile-page">My Profile</a>
        <hr />
        <a class="logout-btn" (click)="logout()">Logout</a>
      </div>
    </div>

   
    <span *ngIf="!isLoggedIn">
      <a routerLink="/sign-in">Login</a>
    </span>
  </nav>
</header>
