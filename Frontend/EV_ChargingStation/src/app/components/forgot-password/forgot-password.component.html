<div class="forgot-password-container">
  <h2>Forgot Password</h2>

  <!-- Step 1: Request OTP -->
  <div *ngIf="step === 1">
    <p>Enter your email to receive an OTP for password reset.</p>
    <input type="email" [(ngModel)]="email" placeholder="Enter your email" required />
    <p *ngIf="emailError" class="error">{{ emailError }}</p>
    <button (click)="sendOtp()">Send OTP</button>
  </div>

  <!-- Step 2: Enter OTP and New Password -->
  <div *ngIf="step === 2">
    <p>Enter the OTP sent to your email and create a new password.</p>
    
    <input type="text" [(ngModel)]="otp" placeholder="Enter OTP" required />
    <p *ngIf="otpError" class="error">{{ otpError }}</p>

    <input type="password" [(ngModel)]="newPassword" placeholder="New Password" required />
    <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm Password" required />
    
    <p *ngIf="passwordError" class="error">{{ passwordError }}</p>
    <button (click)="resetPassword()">Reset Password</button>
  </div>

  <!-- Step 3: Success Message -->
  <div *ngIf="step === 3">
    <p class="success">{{ successMessage }}</p>
    <button routerLink="/sign-in">Go to Login</button>
  </div>
</div>
